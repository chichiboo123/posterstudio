<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>뮤지컬 포스터 스튜디오</title>
  <script>
    // GitHub Pages SPA fallback
    // - Project pages (https://user.github.io/repo): keep 1 path segment
    // - Custom domains (https://example.com): keep 0 path segments
    var l = window.location;
    var pathSegmentsToKeep = l.hostname.endsWith('github.io') ? 1 : 0;

    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
